<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blender Projects</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--bg4:#1e1e28;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#f0f0f5;--text2:#8888a0;--text3:#555565;--accent:#6c63ff;--accent2:#9b95ff;--green:#3ecf8e;--green2:#0a2e1e;--blue:#3b82f6;--blue2:#0a1a2e;--amber:#f59e0b;--amber2:#2a1a00;--red:#ef4444;--red2:#2a0a0a;--pink:#ec4899;--radius:10px;--radius-lg:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100vh}
.nav{display:flex;align-items:center;border-bottom:1px solid var(--border);padding:0 1.5rem;background:var(--bg2);position:sticky;top:0;z-index:50;overflow-x:auto}
.nav-logo{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--text);padding:1rem 1.5rem 1rem 0;border-right:1px solid var(--border);margin-right:1rem;letter-spacing:-0.02em;white-space:nowrap;flex-shrink:0}
.nav-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:6px;box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.nav-tab{padding:1rem;font-size:13px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;background:none;border-left:none;border-right:none;border-top:none;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center;gap:5px}
.nav-tab:hover{color:var(--text2)}
.nav-tab.active{color:var(--text);border-bottom-color:var(--accent)}
.page{max-width:900px;margin:0 auto;padding:2rem 1.25rem 4rem;display:none}
.page.active{display:block}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;outline:none;transition:all 0.15s}
.btn{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:7px 14px;border-radius:var(--radius);font-size:13px;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--accent);color:var(--accent2)}
.btn-accent{background:var(--accent);border:1px solid var(--accent);color:#fff;padding:8px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.btn-accent:hover{background:#7b73ff}
.btn-danger{color:var(--red);border-color:transparent;background:transparent;padding:6px 10px;border-radius:var(--radius);font-size:13px}
.btn-danger:hover{background:rgba(239,68,68,0.1)}
.btn-green{background:var(--green2);border:1px solid rgba(62,207,142,0.25);color:var(--green);padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.btn-stop{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:var(--red);padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity 0.2s}
.stat-card.fertig::before{background:var(--green)}
.stat-card.bearbeitung::before{background:var(--blue)}
.stat-card.idee::before{background:var(--amber)}
.stat-card:hover,.stat-card.active{border-color:var(--border2)}
.stat-card:hover::before,.stat-card.active::before{opacity:1}
.stat-num{font-family:'Space Mono',monospace;font-size:30px;font-weight:700;line-height:1;margin-bottom:4px}
.stat-card.fertig .stat-num{color:var(--green)}
.stat-card.bearbeitung .stat-num{color:var(--blue)}
.stat-card.idee .stat-num{color:var(--amber)}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em}
.lw-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;display:flex;align-items:center;gap:14px;margin-bottom:1.5rem}
.proj-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:8px;overflow:hidden;transition:border-color 0.15s}
.proj-card:hover{border-color:var(--border2)}
.proj-header{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px}
.proj-header:hover{background:var(--bg3)}
.proj-icon{width:32px;height:32px;background:var(--bg4);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.proj-name{font-size:14px;font-weight:500;flex:1}
.badge{font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;white-space:nowrap}
.badge-fertig{background:var(--green2);color:var(--green);border:1px solid rgba(62,207,142,0.2)}
.badge-bearbeitung{background:var(--blue2);color:var(--blue);border:1px solid rgba(59,130,246,0.2)}
.badge-idee{background:var(--amber2);color:var(--amber);border:1px solid rgba(245,158,11,0.2)}
.badge-overdue{background:var(--red2);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.badge-soon{background:var(--amber2);color:var(--amber);border:1px solid rgba(245,158,11,0.2)}
.badge-time{background:var(--bg4);color:var(--text3);border:1px solid var(--border);font-family:'Space Mono',monospace;font-size:11px}
.timer-live{display:inline-flex;align-items:center;gap:5px;background:rgba(62,207,142,0.1);border:1px solid rgba(62,207,142,0.25);color:var(--green);padding:3px 9px;border-radius:20px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1s ease-in-out infinite}
.chevron{font-size:14px;color:var(--text3);transition:transform 0.2s}
.chevron.open{transform:rotate(180deg)}
.proj-body{padding:16px;border-top:1px solid var(--border);display:none}
.proj-body.open{display:block}
.time-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px}
.sub{margin-bottom:16px}
.sub-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sub-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em}
.ifield{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:var(--radius);font-size:13px;outline:none;font-family:'DM Sans',sans-serif}
.ifield:focus{border-color:var(--accent)}
.ifield::placeholder{color:var(--text3)}
.ifield-mono{font-family:'Space Mono',monospace;font-size:12px}
.sfield{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:7px 10px;border-radius:var(--radius);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
.pbar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:8px}
.pbar-fill{height:100%;background:var(--green);border-radius:2px;transition:width 0.3s}
.todo-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.todo-row:last-child{border-bottom:none}
.todo-cb{width:18px;height:18px;border:1px solid var(--border2);border-radius:5px;background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all 0.15s}
.todo-cb.done{background:var(--green);border-color:var(--green);color:#000}
.todo-txt{font-size:13px;flex:1}
.todo-txt.done{text-decoration:line-through;color:var(--text3)}
.del-btn{opacity:0;background:transparent;color:var(--text3);font-size:13px;padding:2px 6px;border-radius:4px}
.todo-row:hover .del-btn{opacity:1}
.del-btn:hover{color:var(--red)}
.add-row{display:flex;gap:8px;margin-top:8px}
.add-row input{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:var(--radius);font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
.add-row input:focus{border-color:var(--accent)}
.add-row input::placeholder{color:var(--text3)}
.short-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:6px}
.short-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.pl-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-top:1px solid var(--border)}
.notes-ta{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:var(--radius);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;resize:vertical;min-height:80px;line-height:1.6}
.notes-ta:focus{border-color:var(--accent)}
.notes-ta::placeholder{color:var(--text3)}
.inspo-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:5px}
.checklist-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cl-step{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.15s}
.cl-step.done{background:var(--green2);border-color:rgba(62,207,142,0.2)}
.cl-box{width:18px;height:18px;border:1px solid var(--border2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;flex-shrink:0;transition:all 0.15s}
.cl-step.done .cl-box{background:var(--green);border-color:var(--green);color:#000}
.cl-lbl{font-size:12px;color:var(--text2)}
.cl-step.done .cl-lbl{color:var(--green)}





.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:24px;width:400px;max-width:calc(100vw - 2rem)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:18px}
.fgroup{margin-bottom:12px}
.flbl{font-size:12px;color:var(--text3);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.05em}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:14px}
.sc-title{font-size:15px;font-weight:600;margin-bottom:4px}
.sc-sub{font-size:13px;color:var(--text3);margin-bottom:14px;line-height:1.6}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:14px}
.chart-title{font-size:13px;color:var(--text2);margin-bottom:14px;font-weight:500}
.srow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.srow:last-child{border-bottom:none}
.srow-lbl{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.srow-bar{flex:2;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.srow-fill{height:100%;border-radius:3px}
.srow-val{font-family:'Space Mono',monospace;font-size:12px;color:var(--text3);min-width:70px;text-align:right}
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.sum-card{background:var(--bg3);border-radius:var(--radius);padding:14px;text-align:center}
.sum-num{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;margin-bottom:4px}
.sum-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em}
.cal-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:8px;display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;transition:border-color 0.15s}
.cal-card:hover{border-color:var(--border2)}
.cal-date{width:52px;height:52px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;font-family:'Space Mono',monospace}
.cal-date.overdue{background:var(--red2);border:1px solid rgba(239,68,68,0.2)}
.cal-date.soon{background:var(--amber2);border:1px solid rgba(245,158,11,0.2)}
.cal-date.ok{background:var(--green2);border:1px solid rgba(62,207,142,0.2)}
.cal-date.none{background:var(--bg3);border:1px solid var(--border)}
.info-box{background:var(--blue2);border:1px solid rgba(59,130,246,0.2);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.ph{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.ph-title{font-size:20px;font-weight:600}
.ph-sub{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.empty{font-size:13px;color:var(--text3);padding:8px 0}
.sec-title{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:var(--radius);font-size:13px;opacity:0;transform:translateY(8px);transition:all 0.2s;z-index:300;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px}
/* REF PANEL */
.ref-tag{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border2);color:var(--text3);cursor:pointer;user-select:none;transition:all 0.15s;flex-shrink:0}
.ref-tag:hover{border-color:var(--accent);color:var(--accent2)}
.ref-tag.active{background:var(--accent);border-color:var(--accent);color:#fff}
.ref-panel{position:fixed;inset:0;background:var(--bg);z-index:400;display:none;flex-direction:column}
.ref-panel.open{display:flex}
.ref-top{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.ref-body{display:flex;flex:1;overflow:hidden}
.ref-results{flex:1;overflow-y:auto;padding:20px}
.ref-sidebar{width:260px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.img-item{border-radius:var(--radius);overflow:hidden;cursor:pointer;position:relative;border:2px solid transparent;background:var(--bg3);aspect-ratio:16/10}
.img-item:hover{border-color:var(--border2)}
.img-item.sel{border-color:var(--accent)}
.img-item img{width:100%;height:100%;object-fit:cover;display:block}
.img-chk{position:absolute;top:6px;right:6px;width:22px;height:22px;background:var(--accent);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700}
.img-item.sel .img-chk{display:flex}
.img-lbl{font-size:10px;color:var(--text3);padding:4px 7px;background:rgba(0,0,0,0.6);position:absolute;bottom:0;left:0;right:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sel-thumb{width:100%;aspect-ratio:16/10;object-fit:cover;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:3px}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo"><span class="nav-dot"></span>blender_projects</div>
  <button class="nav-tab active" id="ntab-projekte" onclick="switchTab('projekte',this)">📁 Projekte</button>
  <button class="nav-tab" id="ntab-kalender" onclick="switchTab('kalender',this)">📅 Kalender</button>
  <button class="nav-tab" id="ntab-statistiken" onclick="switchTab('statistiken',this)">📊 Statistiken</button>
  <button class="nav-tab" id="ntab-einstellungen" onclick="switchTab('einstellungen',this)">⚙️ Einstellungen</button>
</nav>

<div class="page active" id="page-projekte"></div>
<div class="page" id="page-kalender"></div>
<div class="page" id="page-statistiken"></div>
<div class="page" id="page-einstellungen"></div>
<div class="toast" id="toast"></div>

<!-- Modals -->
<div class="modal-bg" id="m-proj"><div class="modal">
  <div class="modal-title">Neues Projekt</div>
  <div class="fgroup"><label class="flbl">Name</label><input class="ifield" style="width:100%" id="np-name" placeholder="z.B. Raccoon City – RE2"/></div>
  <div class="fgroup"><label class="flbl">Status</label><select class="sfield" style="width:100%" id="np-status"><option value="idee">💡 Idee</option><option value="bearbeitung" selected>🔵 In Bearbeitung</option><option value="fertig">✅ Fertig</option></select></div>
  <div class="fgroup"><label class="flbl">Blender Datei (optional)</label><input class="ifield ifield-mono" style="width:100%" id="np-file" placeholder="projekt.blend1"/></div>
  <div class="fgroup"><label class="flbl">Deadline (optional)</label><input class="ifield" style="width:100%" id="np-due" type="date"/></div>
  <div class="modal-foot"><button class="btn" onclick="closeModal('m-proj')">Abbrechen</button><button class="btn-accent" onclick="createProject()">Erstellen</button></div>
</div></div>

<div class="modal-bg" id="m-short"><div class="modal">
  <div class="modal-title">Short hinzufügen</div>
  <input type="hidden" id="ns-pid"/>
  <div class="fgroup"><label class="flbl">Titel</label><input class="ifield" style="width:100%" id="ns-title" placeholder="Titel"/></div>
  <div class="fgroup"><label class="flbl">Tags (kommagetrennt)</label><input class="ifield" style="width:100%" id="ns-tags" placeholder="Blender, Retro, Game"/></div>
  <div class="modal-foot"><button class="btn" onclick="closeModal('m-short')">Abbrechen</button><button class="btn-accent" onclick="createShort()">Hinzufügen</button></div>
</div></div>

<div class="modal-bg" id="m-plat"><div class="modal">
  <div class="modal-title">Plattform hinzufügen</div>
  <input type="hidden" id="npl-sid"/>
  <div class="fgroup"><label class="flbl">Plattform</label><select class="sfield" style="width:100%" id="npl-plat">
    <option value="youtube">📺 YouTube</option>
    <option value="tiktok">🎵 TikTok</option>
    <option value="instagram">📸 Instagram Reels</option>
    <option value="facebook">📘 Facebook Reels</option>
    <option value="snapchat">👻 Snapchat</option>
    <option value="twitter">🐦 X / Twitter</option>
    <option value="pinterest">📌 Pinterest</option>
    <option value="reddit">🤖 Reddit</option>
    <option value="twitch">🎮 Twitch Clips</option>
    <option value="kick">🟢 Kick</option>
    <option value="rumble">📹 Rumble</option>
    <option value="linkedin">💼 LinkedIn</option>
  </select></div>
  <div class="fgroup"><label class="flbl">Aufrufe</label><input class="ifield" style="width:100%" id="npl-views" type="number" placeholder="0"/></div>
  <div class="fgroup"><label class="flbl">Einnahmen (€)</label><input class="ifield" style="width:100%" id="npl-rev" type="number" step="0.01" placeholder="0.00"/></div>
  <div class="fgroup"><label class="flbl">Link</label><input class="ifield" style="width:100%" id="npl-link" placeholder="https://..."/></div>
  <div class="modal-foot"><button class="btn" onclick="closeModal('m-plat')">Abbrechen</button><button class="btn-accent" onclick="createPlatform()">Hinzufügen</button></div>
</div></div>

<div class="modal-bg" id="m-inspo"><div class="modal">
  <div class="modal-title">Inspiration hinzufügen</div>
  <input type="hidden" id="ni-pid"/>
  <div class="fgroup"><label class="flbl">Titel</label><input class="ifield" style="width:100%" id="ni-title" placeholder="z.B. RE2 Concept Art"/></div>
  <div class="fgroup"><label class="flbl">Link</label><input class="ifield" style="width:100%" id="ni-url" placeholder="https://..."/></div>
  <div class="fgroup"><label class="flbl">Typ</label><select class="sfield" style="width:100%" id="ni-type"><option value="link">🔗 Link</option><option value="video">▶ Video</option><option value="image">🖼 Bild</option><option value="ref">📌 Referenz</option></select></div>
  <div class="modal-foot"><button class="btn" onclick="closeModal('m-inspo')">Abbrechen</button><button class="btn-accent" onclick="createInspo()">Hinzufügen</button></div>
</div></div>



<script>
// ── DATA ──────────────────────────────────────────────────
var db = null;
var D = { projects:[], todos:[], shorts:[], sessions:[], settings:{}, notes:[], inspirations:[], shortPlatforms:[], projectRefs:[] };

// ── HELPERS ───────────────────────────────────────────────
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function statusLabel(s) { return s==='fertig'?'Fertig':s==='bearbeitung'?'In Bearbeitung':'Idee'; }
function statusIcon(s)  { return s==='fertig'?'✅':s==='bearbeitung'?'🔵':'💡'; }
function fmt(n)         { return n>=1000?(n/1000).toFixed(1)+'k':String(n||0); }
function fmtEuro(n)     { return '€'+parseFloat(n||0).toFixed(2); }
function fmtMs(ms)      { if(!ms||ms<0) return '0m'; var m=Math.floor(ms/60000),h=Math.floor(m/60); return h>0?h+'h '+(m%60)+'m':m+'m'; }
function fmtHMS(ms)     { if(!ms||ms<0) return '00:00:00'; var s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60); return pad(h)+':'+pad(m%60)+':'+pad(s%60); }
function pad(n)         { return String(n).padStart(2,'0'); }
function daysUntil(d)   { if(!d) return null; return Math.ceil((new Date(d)-new Date(new Date().toDateString()))/(864e5)); }
function totalTime(pid) { var t=0; D.sessions.filter(function(s){return s.project_id===pid;}).forEach(function(s){var e=s.ended_at?new Date(s.ended_at):new Date();t+=e-new Date(s.started_at);}); return t; }
function totalRevenue(pid){ var r=0; D.shorts.filter(function(s){return s.project_id===pid;}).forEach(function(s){D.shortPlatforms.filter(function(p){return p.short_id===s.id;}).forEach(function(p){r+=parseFloat(p.revenue||0);});}); return r; }
function totalViews(pid)  { var v=0; D.shorts.filter(function(s){return s.project_id===pid;}).forEach(function(s){D.shortPlatforms.filter(function(p){return p.short_id===s.id;}).forEach(function(p){v+=parseInt(p.views||0);});}); return v; }
function clPct(p)       { var cl=p.checklist||{}; return Math.round(CL_STEPS.filter(function(s){return cl[s.k];}).length/CL_STEPS.length*100); }
function timeAgo(iso)   { if(!iso) return ''; var h=Math.floor((Date.now()-new Date(iso))/ 3600000); if(h<1) return 'Gerade eben'; if(h<24) return 'Vor '+h+'h'; return 'Vor '+Math.floor(h/24)+'d'; }
function lastWorked()   { return D.projects.filter(function(p){return p.last_worked;}).sort(function(a,b){return new Date(b.last_worked)-new Date(a.last_worked);})[0]; }

// ── MODAL CLOSE ON BG CLICK ───────────────────────────────
document.addEventListener('click', function(e) {
  if (e.target && e.target.classList && e.target.classList.contains('modal-bg')) {
    e.target.classList.remove('open');
  }
});

// ── INIT ──────────────────────────────────────────────────
function isConfigured() {
  return typeof SUPABASE_URL !== 'undefined' && SUPABASE_URL !== 'DEINE_SUPABASE_URL_HIER' &&
         typeof SUPABASE_KEY !== 'undefined' && SUPABASE_KEY !== 'DEIN_SUPABASE_ANON_KEY_HIER';
}

function init() {
  if (!isConfigured()) {
    document.getElementById('page-projekte').innerHTML = '<div style="max-width:460px;margin:4rem auto;padding:1.25rem"><div style="font-family:Space Mono,monospace;font-size:18px;font-weight:700;margin-bottom:8px">// Setup erforderlich</div><div style="font-size:13px;color:var(--text3)">Trag deine Supabase Zugangsdaten in config.js ein.</div></div>';
    return;
  }
  document.getElementById('page-projekte').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  return new Promise(function(resolve){
    try {
      var slib = window.supabase || window.Supabase || supabase;
      var sc = slib.createClient(SUPABASE_URL, SUPABASE_KEY);
      db = sc;
      loadAll().then(function() {
        renderProjects();
        if (D.settings['yt_api_key']) setTimeout(function(){ syncYT(true); }, 2000);
        resolve();
      });
    } catch(e) {
      document.getElementById('page-projekte').innerHTML = '<div class="loading"><div style="color:var(--red)">Fehler: '+e.message+'</div></div>';
      resolve();
    }
  });
}

async function loadAll() {
  var res = await Promise.all([
    db.from('projects').select('*').order('created_at',{ascending:false}),
    db.from('todos').select('*').order('created_at',{ascending:true}),
    db.from('shorts').select('*').order('created_at',{ascending:false}),
    db.from('time_sessions').select('*').order('started_at',{ascending:false}),
    db.from('settings').select('*'),
    db.from('notes').select('*'),
    db.from('inspirations').select('*').order('created_at',{ascending:false}),
    db.from('short_platforms').select('*').order('created_at',{ascending:false}),
    db.from('project_references').select('*').order('created_at',{ascending:false}),
  ]);
  D.projects = res[0].data||[]; D.todos = res[1].data||[]; D.shorts = res[2].data||[];
  D.sessions = res[3].data||[]; D.notes = res[5].data||[]; D.inspirations = res[6].data||[];
  D.shortPlatforms = res[7].data||[]; D.projectRefs = res[8].data||[];
  D.settings = {};
  if (res[4].data) res[4].data.forEach(function(s){ D.settings[s.key]=s.value; });
  D.sessions.filter(function(s){return !s.ended_at;}).forEach(function(s){
    if (!UI.activeSessions[s.project_id]) {
      UI.activeSessions[s.project_id] = s.id;
      UI.activeStarts[s.project_id] = new Date(s.started_at);
    }
  });
}

// ── TAB SWITCHING ─────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('page-'+name).classList.add('active');
  if (name === 'kalender')     renderKalender();
  if (name === 'statistiken')  renderStatistiken();
  if (name === 'einstellungen') renderEinstellungen();
}

// ── PROJECTS PAGE ─────────────────────────────────────────
function renderProjects() {
  var pg = document.getElementById('page-projekte');
  var fertig = D.projects.filter(function(p){return p.status==='fertig';}).length;
  var bear   = D.projects.filter(function(p){return p.status==='bearbeitung';}).length;
  var idee   = D.projects.filter(function(p){return p.status==='idee';}).length;
  var lw     = lastWorked();
  var list   = UI.filter ? D.projects.filter(function(p){return p.status===UI.filter;}) : D.projects;
  var html   = '';

  html += '<div class="ph"><div><div class="ph-sub">Übersicht</div><div class="ph-title">'+D.projects.length+' Projekte</div></div><button class="btn-accent" onclick="openModal(\'m-proj\')">+ Neues Projekt</button></div>';
  html += '<div class="stats-grid">';
  html += '<div class="stat-card fertig'+(UI.filter==='fertig'?' active':'')+'" onclick="setFilter(\'fertig\')"><div style="font-size:20px;margin-bottom:8px">✅</div><div class="stat-num">'+fertig+'</div><div class="stat-label">Fertig</div></div>';
  html += '<div class="stat-card bearbeitung'+(UI.filter==='bearbeitung'?' active':'')+'" onclick="setFilter(\'bearbeitung\')"><div style="font-size:20px;margin-bottom:8px">🔵</div><div class="stat-num">'+bear+'</div><div class="stat-label">In Arbeit</div></div>';
  html += '<div class="stat-card idee'+(UI.filter==='idee'?' active':'')+'" onclick="setFilter(\'idee\')"><div style="font-size:20px;margin-bottom:8px">💡</div><div class="stat-num">'+idee+'</div><div class="stat-label">Ideen</div></div>';
  html += '</div>';

  if (lw) {
    var lt = D.todos.filter(function(t){return t.project_id===lw.id;});
    var ld = lt.filter(function(t){return t.done;}).length;
    var pct = lt.length ? Math.round(ld/lt.length*100) : 0;
    html += '<div class="lw-box"><div style="width:38px;height:38px;background:var(--bg4);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🎬</div><div style="flex:1;min-width:0"><div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">Zuletzt bearbeitet</div><div style="font-size:15px;font-weight:500">'+lw.name+'</div>'+(lw.blender_file?'<div style="font-size:12px;color:var(--text3);font-family:Space Mono,monospace;margin-top:2px">📁 '+lw.blender_file+'</div>':'')+'<div style="margin-top:6px"><div class="pbar"><div class="pbar-fill" style="width:'+pct+'%"></div></div><div style="font-size:11px;color:var(--text3)">'+ld+'/'+lt.length+' Tasks · ⏱ '+fmtMs(totalTime(lw.id))+'</div></div></div><div style="font-size:12px;color:var(--text3);margin-left:auto;white-space:nowrap">'+timeAgo(lw.last_worked)+'</div></div>';
  }

  if (UI.filter) html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:12px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:4px 12px;border-radius:20px">'+statusIcon(UI.filter)+' '+statusLabel(UI.filter)+'</span><span style="font-size:12px;color:var(--text3);cursor:pointer" onclick="setFilter(null)">✕ Zurücksetzen</span></div>';

  if (!list.length) html += '<div style="text-align:center;padding:3rem 0;color:var(--text3);font-size:14px">Keine Projekte</div>';

  list.forEach(function(p) {
    var exp = UI.expanded.has(p.id);
    var ptodos = D.todos.filter(function(t){return t.project_id===p.id;});
    var pshorts = D.shorts.filter(function(s){return s.project_id===p.id;});
    var done = ptodos.filter(function(t){return t.done;}).length;
    var running = !!UI.activeSessions[p.id];
    var tms = totalTime(p.id);
    var days = daysUntil(p.due_date);
    var rev = totalRevenue(p.id);
    var views = totalViews(p.id);
    var cpct = clPct(p);

    html += '<div class="proj-card"><div class="proj-header" onclick="toggleExp(\''+p.id+'\')">';
    html += '<div class="proj-icon">'+statusIcon(p.status)+'</div>';
    html += '<div class="proj-name">'+p.name+'</div>';
    html += '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">';
    html += '<span class="badge badge-'+p.status+'">'+statusLabel(p.status)+'</span>';
    if (days !== null && days < 0) html += '<span class="badge badge-overdue">⚠ '+Math.abs(days)+'d überfällig</span>';
    if (days !== null && days >= 0 && days <= 7) html += '<span class="badge badge-soon">📅 '+days+'d</span>';
    if (running) html += '<span class="timer-live"><span class="tdot"></span><span id="lt-'+p.id+'">'+fmtHMS(Date.now()-UI.activeStarts[p.id])+'</span></span>';
    else if (tms > 0) html += '<span class="badge badge-time">⏱ '+fmtMs(tms)+'</span>';
    if (views > 0) html += '<span style="font-size:12px;color:var(--text3)">👁 '+fmt(views)+'</span>';
    if (rev > 0) html += '<span style="font-size:12px;color:var(--green)">💰 '+fmtEuro(rev)+'</span>';
    if (cpct > 0) html += '<span style="font-size:12px;color:var(--text3)">☑ '+cpct+'%</span>';
    html += '<span style="font-size:12px;color:var(--text3)">'+done+'/'+ptodos.length+' ✓</span>';
    html += '</div><div class="chevron'+(exp?' open':'')+'">▾</div></div>';

    if (exp) {
      var psess = D.sessions.filter(function(s){return s.project_id===p.id;});
      var pnote = D.notes.find(function(n){return n.project_id===p.id;});
      var pinspo = D.inspirations.filter(function(i){return i.project_id===p.id;});
      var prefs = D.projectRefs.filter(function(r){return r.project_id===p.id;});
      var cl = p.checklist || {};

      html += '<div class="proj-body open">';

      // TIME
      html += '<div class="time-box"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><div><div style="font-family:Space Mono,monospace;font-size:20px;font-weight:700">'+fmtMs(tms)+'</div><div style="font-size:11px;color:var(--text3)">'+psess.length+' Sessions</div></div>';
      html += running ? '<button class="btn-stop" onclick="stopTimer(\''+p.id+'\')">⏹ Stoppen</button>' : '<button class="btn-green" onclick="startTimer(\''+p.id+'\')">▶ Starten</button>';
      html += '</div>';
      if (psess.length) {
        html += '<div style="border-top:1px solid var(--border);padding-top:8px;margin-top:6px">';
        psess.slice(0,3).forEach(function(s){
          var dur = s.ended_at ? new Date(s.ended_at)-new Date(s.started_at) : Date.now()-new Date(s.started_at);
          var dt = new Date(s.started_at);
          html += '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text3)"><span style="font-family:Space Mono,monospace;font-size:11px;flex:1">'+dt.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+dt.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+'</span><span style="font-family:Space Mono,monospace;color:var(--text2)">'+fmtMs(dur)+'</span>'+(s.ended_at?'':'<span style="font-size:11px;color:var(--green)">● läuft</span>')+'</div>';
        });
        html += '</div>';
      }
      html += '</div>';

      // CHECKLIST
      var cdone = CL_STEPS.filter(function(s){return cl[s.k];}).length;
      html += '<div class="sub"><div class="sub-hdr"><div class="sub-lbl">☑ Checkliste <span style="font-weight:400">'+cpct+'%</span></div><span style="font-size:12px;color:var(--text3)">'+cdone+'/'+CL_STEPS.length+'</span></div>';
      html += '<div class="pbar"><div class="pbar-fill" style="width:'+cpct+'%"></div></div>';
      html += '<div class="checklist-grid">';
      CL_STEPS.forEach(function(step){
        var d = !!cl[step.k];
        html += '<div class="cl-step'+(d?' done':'')+'" onclick="toggleCL(\''+p.id+'\',\''+step.k+'\','+(d?'false':'true')+')"><div class="cl-box">'+(d?'✓':'')+'</div><div class="cl-lbl">'+step.l+'</div></div>';
      });
      html += '</div></div>';

      // FILE + STATUS + DATE
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">';
      html += '<span>📁</span><input class="ifield ifield-mono" style="flex:1;min-width:120px" placeholder="datei.blend1" value="'+(p.blender_file||'')+'" onchange="updFile(\''+p.id+'\',this.value)"/>';
      html += '<input class="ifield" type="date" value="'+(p.due_date||'')+'" title="Deadline" onchange="updDue(\''+p.id+'\',this.value)" style="width:140px"/>';
      html += '<select class="sfield" onchange="updStatus(\''+p.id+'\',this.value)"><option value="idee"'+(p.status==='idee'?' selected':'')+'>💡 Idee</option><option value="bearbeitung"'+(p.status==='bearbeitung'?' selected':'')+'>🔵 In Arbeit</option><option value="fertig"'+(p.status==='fertig'?' selected':'')+'>✅ Fertig</option></select>';
      html += '<button class="btn-danger" onclick="delProject(\''+p.id+'\')">🗑</button></div>';

      // SHORTS
      html += '<div class="sub"><div class="sub-hdr"><div class="sub-lbl">▶ Shorts</div><button class="btn" onclick="openShortModal(\''+p.id+'\')">+ Short</button></div>';
      if (!pshorts.length) html += '<div class="empty">Noch keine Shorts</div>';
      pshorts.forEach(function(s){
        var tags = Array.isArray(s.tags) ? s.tags : [];
        var platforms = D.shortPlatforms.filter(function(pl){return pl.short_id===s.id;});
        var sv = platforms.reduce(function(a,pl){return a+parseInt(pl.views||0);},0);
        var sr = platforms.reduce(function(a,pl){return a+parseFloat(pl.revenue||0);},0);
        html += '<div class="short-card"><div class="short-hdr"><div style="width:28px;height:28px;background:var(--bg4);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">▶</div><div style="font-size:13px;font-weight:500;flex:1">'+s.title+'</div>';
        if (sv>0) html += '<span style="font-family:Space Mono,monospace;font-size:12px;color:var(--text3)">👁 '+fmt(sv)+'</span>';
        if (sr>0) html += '<span style="font-family:Space Mono,monospace;font-size:12px;color:var(--green)">💰 '+fmtEuro(sr)+'</span>';
        html += '<button class="btn" style="font-size:11px;padding:4px 10px" onclick="openPlatModal(\''+s.id+'\')">+ Plattform</button>';
        html += '<button class="btn-danger" style="font-size:12px;padding:4px 8px" onclick="delShort(\''+s.id+'\')">✕</button></div>';
        if (tags.length) html += '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px">'+tags.map(function(t){return '<span style="font-size:11px;background:var(--bg4);color:var(--text3);padding:1px 7px;border-radius:20px;border:1px solid var(--border)">#'+t+'</span>';}).join('')+'</div>';

          var pi = PLAT[pl.platform] || {icon:'🔗',label:pl.platform,color:'var(--text2)'};
          html += '<div class="pl-row"><span style="font-size:14px">'+pi.icon+'</span><span style="font-size:12px;color:'+pi.color+';min-width:100px;font-weight:500">'+pi.label+'</span><span style="font-family:Space Mono,monospace;font-size:12px;color:var(--text2);min-width:60px">👁 '+fmt(parseInt(pl.views||0))+'</span><span style="font-family:Space Mono,monospace;font-size:12px;color:var(--green);min-width:55px">'+(parseFloat(pl.revenue||0)>0?'💰 '+fmtEuro(pl.revenue):'')+'</span>'+(pl.link?'<a href="'+pl.link+'" target="_blank" style="font-size:11px;color:var(--accent2);text-decoration:none;flex:1">🔗 Link</a>':'<span style="flex:1"></span>')+'<button class="btn-danger" style="font-size:11px;padding:2px 6px" onclick="delPlatform(\''+pl.id+'\')">✕</button></div>';
        });
        html += '</div>';
      });
      html += '</div>';

      // NOTES
      html += '<div class="sub"><div class="sub-hdr"><div class="sub-lbl">📝 Notizen</div><span style="font-size:11px;color:var(--text3)" id="ns-'+p.id+'"></span></div>';
      html += '<textarea class="notes-ta" id="na-'+p.id+'" placeholder="Ideen, Referenzen, Anmerkungen..." oninput="saveNote(\''+p.id+'\',this.value)">'+(pnote?pnote.content:'')+'</textarea></div>';

      // INSPIRATIONS
      html += '<div class="sub"><div class="sub-hdr"><div class="sub-lbl">💡 Inspirations-Board</div><button class="btn" onclick="openInspoModal(\''+p.id+'\')">+ Link</button></div>';
      if (!pinspo.length) html += '<div class="empty">Noch keine Inspirationen</div>';
      pinspo.forEach(function(i){
        var icons = {video:'▶',image:'🖼',ref:'📌',link:'🔗'};
        html += '<div class="inspo-row"><div style="width:26px;height:26px;background:var(--bg4);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">'+(icons[i.type]||'🔗')+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">'+i.title+'</div><a href="'+i.url+'" target="_blank" style="font-size:12px;color:var(--accent2);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block">'+i.url+'</a></div><button class="btn-danger" style="font-size:12px;padding:4px 8px" onclick="delInspo(\''+i.id+'\')">✕</button></div>';
      });
      html += '</div>';

      // TODOS
      var tpct = ptodos.length ? Math.round(done/ptodos.length*100) : 0;
      html += '<div class="sub"><div class="sub-hdr"><div class="sub-lbl">✓ Todo-Liste <span style="font-weight:400">'+tpct+'%</span></div><span style="font-size:12px;color:var(--text3)">'+done+'/'+ptodos.length+'</span></div>';
      html += '<div class="pbar"><div class="pbar-fill" style="width:'+tpct+'%"></div></div>';
      if (!ptodos.length) html += '<div class="empty">Noch keine Tasks</div>';
      ptodos.forEach(function(t){
        var doneClass = t.done ? ' done' : '';
        var checkMark = t.done ? '&#10003;' : '';
        html += '<div class="todo-row">';
        html += '<div class="todo-cb'+doneClass+'" data-tid="'+t.id+'" data-pid="'+p.id+'" onclick="cbClick(this)">'+checkMark+'</div>';
        html += '<div class="todo-txt'+doneClass+'">'+t.text+'</div>';
        html += '<button class="del-btn btn-danger" data-tid="'+t.id+'" onclick="tdClick(this)" style="font-size:12px;padding:4px 6px">&#10005;</button>';
        html += '</div>';
      });
      html += '<div class="add-row"><input placeholder="Neuen Task..." id="ti-'+p.id+'" data-pid="'+p.id+'" oninput="tiInput(this)" onkeydown="tiKey(event,this)"/><button class="btn-accent" data-pid="'+p.id+'" onclick="tiBtnClick(this)">+ Task</button></div>';
      html += '</div></div>';
    }
    html += '</div>';
  });

  pg.innerHTML = html;

  // Restart live timers
  Object.keys(UI.activeSessions).forEach(function(pid){
    if (UI.activeTimers[pid]) clearInterval(UI.activeTimers[pid]);
    UI.activeTimers[pid] = setInterval(function(){
      var el = document.getElementById('lt-'+pid);
      if (el && UI.activeStarts[pid]) el.textContent = fmtHMS(Date.now()-UI.activeStarts[pid]);
    }, 1000);
  });
}

// ── CALENDAR PAGE ─────────────────────────────────────────
function renderKalender() {
  var pg = document.getElementById('page-kalender');
  var now = new Date();
  var sm = (window._cm !== undefined) ? window._cm : now.getMonth();
  var sy = (window._cy !== undefined) ? window._cy : now.getFullYear();
  window._cm = sm; window._cy = sy;
  var first = new Date(sy, sm, 1);
  var last  = new Date(sy, sm+1, 0);
  var sdow  = (first.getDay()+6)%7;
  var total = last.getDate();
  var mname = first.toLocaleString('de-DE',{month:'long',year:'numeric'});
  var dmap  = {};
  D.projects.filter(function(p){return p.due_date;}).forEach(function(p){ if(!dmap[p.due_date])dmap[p.due_date]=[]; dmap[p.due_date].push(p); });
  var wdate = D.projects.filter(function(p){return p.due_date;}).sort(function(a,b){return new Date(a.due_date)-new Date(b.due_date);});

  var html = '<div class="ph"><div><div class="ph-sub">Planung</div><div class="ph-title">Kalender</div></div>'+(wdate.length?'<button class="btn" onclick="exportICS()">📥 .ics Export</button>':'')+'</div>';
  html += '<div class="chart-card" style="padding:0;overflow:hidden">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)">';
  html += '<button class="btn" onclick="window._cm='+(sm===0?11:sm-1)+';window._cy='+(sm===0?sy-1:sy)+';renderKalender()">◀</button>';
  html += '<div style="font-size:15px;font-weight:500">'+mname+'</div>';
  html += '<button class="btn" onclick="window._cm='+(sm===11?0:sm+1)+';window._cy='+(sm===11?sy+1:sy)+';renderKalender()">▶</button></div>';
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)">';
  ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(function(d){ html += '<div style="text-align:center;padding:8px 4px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">'+d+'</div>'; });
  html += '</div><div style="display:grid;grid-template-columns:repeat(7,1fr)">';
  for (var i=0;i<sdow;i++) html += '<div style="min-height:68px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg3);opacity:.4"></div>';
  for (var day=1;day<=total;day++) {
    var ds = sy+'-'+pad(sm+1)+'-'+pad(day);
    var isToday = day===now.getDate() && sm===now.getMonth() && sy===now.getFullYear();
    var evs = dmap[ds]||[];
    var col = (sdow+day-1)%7, wknd = col===5||col===6;
    html += '<div style="min-height:68px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:5px;'+(wknd?'background:rgba(255,255,255,.01)':'')+'">';
    html += '<div style="font-size:12px;font-weight:'+(isToday?'700':'400')+';color:'+(isToday?'#fff':'var(--text3)')+';width:22px;height:22px;border-radius:50%;background:'+(isToday?'var(--accent)':'transparent')+';display:flex;align-items:center;justify-content:center;margin-bottom:3px">'+day+'</div>';
    evs.forEach(function(p){
      var d2=daysUntil(p.due_date),bg=d2<0?'var(--red2)':d2<=3?'var(--amber2)':'var(--green2)',col2=d2<0?'var(--red)':d2<=3?'var(--amber)':'var(--green)';
      html += '<div onclick="focusProj(\''+p.id+'\')" title="'+p.name+'" style="font-size:10px;background:'+bg+';color:'+col2+';border-radius:4px;padding:2px 5px;margin-bottom:2px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">🎬 '+p.name+'</div>';
    });
    html += '</div>';
  }
  var rem = (7-(sdow+total)%7)%7;
  for (var j=0;j<rem;j++) html += '<div style="min-height:68px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg3);opacity:.4"></div>';
  html += '</div></div>';

  var upcoming = wdate.filter(function(p){var d=daysUntil(p.due_date);return d!==null&&d>=-7;}).slice(0,6);
  if (upcoming.length) {
    html += '<div style="margin-top:14px"><div class="sec-title" style="margin-bottom:10px">Nächste Deadlines</div>';
    upcoming.forEach(function(p){
      var days=daysUntil(p.due_date), d=new Date(p.due_date);
      var dc=days<0?'var(--red)':days<=7?'var(--amber)':'var(--green)';
      var dt=days<0?Math.abs(days)+'d überfällig':days===0?'Heute!':days===1?'Morgen':days+'d noch';
      var bc=days<0?'overdue':days<=7?'soon':'ok';
      html += '<div class="cal-card" onclick="focusProj(\''+p.id+'\')">';
      html += '<div class="cal-date '+bc+'"><div style="font-size:19px;font-weight:700;color:'+dc+'">'+d.getDate()+'</div><div style="font-size:10px;text-transform:uppercase;color:'+dc+'">'+d.toLocaleString('de-DE',{month:'short'}).toUpperCase()+'</div></div>';
      html += '<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:500">'+p.name+'</div><div style="margin-top:4px"><span class="badge badge-'+p.status+'">'+statusLabel(p.status)+'</span></div></div>';
      html += '<div style="font-size:12px;font-family:Space Mono,monospace;color:'+dc+';white-space:nowrap">'+dt+'</div></div>';
    });
    html += '</div>';
  }

  pg.innerHTML = html;
}

function exportICS() {
  var ics = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Blender Dashboard//DE\r\n";
  D.projects.filter(function(p){return p.due_date;}).forEach(function(p){
    var d = p.due_date.replace(/-/g,'');
    ics += "BEGIN:VEVENT\r\nUID:"+p.id+"@blender\r\nDTSTART;VALUE=DATE:"+d+"\r\nDTEND;VALUE=DATE:"+d+"\r\nSUMMARY:🎬 "+p.name+"\r\nEND:VEVENT\r\n";
  });
  ics += "END:VCALENDAR";
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));
  a.download = 'blender-deadlines.ics'; a.click();
  toast('Kalender exportiert ✓');
}

// ── STATS PAGE ────────────────────────────────────────────
function renderStatistiken() {
  var pg = document.getElementById('page-statistiken');
  var totTime = D.sessions.reduce(function(a,s){var e=s.ended_at?new Date(s.ended_at):new Date();return a+(e-new Date(s.started_at));},0);
  var totViews = D.shortPlatforms.reduce(function(a,p){return a+parseInt(p.views||0);},0);
  var totRev = D.shortPlatforms.reduce(function(a,p){return a+parseFloat(p.revenue||0);},0);
  var html = '<div>';
  html += '<div class="ph"><div><div class="ph-sub">Auswertung</div><div class="ph-title">Statistiken</div></div>';
  if (D.settings['yt_api_key'] && D.shortPlatforms.filter(function(p){return p.platform==='youtube'&&p.link;}).length) html += '<button class="btn-green" onclick="syncYT(false)">🔄 YouTube Sync</button>';
  html += '</div>';
  html += '<div class="sum-grid"><div class="sum-card"><div class="sum-num" style="color:var(--accent)">'+D.projects.length+'</div><div class="sum-lbl">Projekte</div></div><div class="sum-card"><div class="sum-num" style="color:var(--green)">'+fmtMs(totTime)+'</div><div class="sum-lbl">Arbeitszeit</div></div><div class="sum-card"><div class="sum-num" style="color:var(--blue)">'+fmt(totViews)+'</div><div class="sum-lbl">Views</div></div><div class="sum-card"><div class="sum-num" style="color:var(--green)">€'+totRev.toFixed(2)+'</div><div class="sum-lbl">Einnahmen</div></div></div>';

  var pRevs = D.projects.map(function(p){return{name:p.name,r:totalRevenue(p.id)};}).filter(function(x){return x.r>0;}).sort(function(a,b){return b.r-a.r;});
  if (pRevs.length) {
    var mx = pRevs[0].r;
    html += '<div class="chart-card"><div class="chart-title">💰 Einnahmen pro Projekt</div>';
    pRevs.forEach(function(x){ html += '<div class="srow"><div class="srow-lbl">'+x.name+'</div><div class="srow-bar"><div class="srow-fill" style="width:'+Math.round(x.r/mx*100)+'%;background:var(--green)"></div></div><div class="srow-val">€'+x.r.toFixed(2)+'</div></div>'; });
    html += '</div>';
  }

  var platV = {};
  D.shortPlatforms.forEach(function(p){ if(!platV[p.platform])platV[p.platform]=0; platV[p.platform]+=parseInt(p.views||0); });
  var pents = Object.entries(platV).filter(function(x){return x[1]>0;}).sort(function(a,b){return b[1]-a[1];});
  if (pents.length) {
    var mv = pents[0][1];
    html += '<div class="chart-card"><div class="chart-title">▶ Views nach Plattform</div>';
    pents.forEach(function(e){ var pi=PLAT[e[0]]||{icon:'🔗',label:e[0],color:'var(--text2)'}; html += '<div class="srow"><div class="srow-lbl">'+pi.icon+' '+pi.label+'</div><div class="srow-bar"><div class="srow-fill" style="width:'+Math.round(e[1]/mv*100)+'%;background:'+pi.color+'"></div></div><div class="srow-val">👁 '+fmt(e[1])+'</div></div>'; });
    html += '</div>';
  }

  var pTimes = D.projects.map(function(p){return{name:p.name,ms:totalTime(p.id)};}).filter(function(x){return x.ms>0;}).sort(function(a,b){return b.ms-a.ms;});
  if (pTimes.length) {
    var mt = pTimes[0].ms;
    html += '<div class="chart-card"><div class="chart-title">⏱ Arbeitszeit pro Projekt</div>';
    pTimes.forEach(function(x){ html += '<div class="srow"><div class="srow-lbl">'+x.name+'</div><div class="srow-bar"><div class="srow-fill" style="width:'+Math.round(x.ms/mt*100)+'%;background:var(--accent)"></div></div><div class="srow-val">'+fmtMs(x.ms)+'</div></div>'; });
    html += '</div>';
  }

  if (!pRevs.length && !pents.length && !pTimes.length) html += '<div style="text-align:center;padding:3rem;color:var(--text3)">Noch keine Daten – starte Zeiterfassung und trag Views ein!</div>';
  html += '</div>';
  pg.innerHTML = html;
}

// ── ACTIONS ───────────────────────────────────────────────
function setFilter(f){ UI.filter = UI.filter===f?null:f; renderProjects(); }
function toggleExp(id){ if(UI.expanded.has(id))UI.expanded.delete(id);else UI.expanded.add(id); renderProjects(); }
function focusProj(id){ switchTab('projekte',document.getElementById('ntab-projekte')); setTimeout(function(){UI.filter=null;UI.expanded.add(id);renderProjects();},50); }

async function saveSetting(k,v){ await db.from('settings').upsert({key:k,value:v}); D.settings[k]=v; }

async function startTimer(pid){
  if(UI.activeSessions[pid]) return;
  var now = new Date().toISOString();
  var r = await db.from('time_sessions').insert({project_id:pid,started_at:now}).select().single();
  if(r.error){toast('Fehler: '+r.error.message);return;}
  UI.activeSessions[pid]=r.data.id; UI.activeStarts[pid]=new Date(now);
  await db.from('projects').update({last_worked:now}).eq('id',pid);
  await loadAll(); renderProjects(); toast('⏱ Gestartet');
}
async function stopTimer(pid){
  var sid = UI.activeSessions[pid]; if(!sid) return;
  var now = new Date().toISOString();
  await db.from('time_sessions').update({ended_at:now}).eq('id',sid);
  if(UI.activeTimers[pid]){clearInterval(UI.activeTimers[pid]);delete UI.activeTimers[pid];}
  delete UI.activeSessions[pid]; delete UI.activeStarts[pid];
  await db.from('projects').update({last_worked:now}).eq('id',pid);
  await loadAll(); renderProjects(); toast('⏹ Gestoppt');
}

async function toggleCL(pid,key,val){
  var p = D.projects.find(function(x){return x.id===pid;});
  if(!p) return;
  var cl = Object.assign({},p.checklist||{});
  cl[key] = val==='true'||val===true;
  await db.from('projects').update({checklist:cl,last_worked:new Date().toISOString()}).eq('id',pid);
  await loadAll(); renderProjects();
}

function saveNote(pid,content){
  var el = document.getElementById('ns-'+pid);
  if(el) el.textContent='...';
  if(UI.noteDebounce[pid]) clearTimeout(UI.noteDebounce[pid]);
  UI.noteDebounce[pid] = setTimeout(async function(){
    var ex = D.notes.find(function(n){return n.project_id===pid;});
    if(ex) await db.from('notes').update({content:content,updated_at:new Date().toISOString()}).eq('id',ex.id);
    else await db.from('notes').insert({project_id:pid,content:content});
    await loadAll();
    var el2 = document.getElementById('ns-'+pid);
    if(el2){el2.textContent='gespeichert ✓'; setTimeout(function(){if(el2)el2.textContent='';},2000);}
  },800);
}

async function createProject(){
  var name=document.getElementById('np-name').value.trim();
  var status=document.getElementById('np-status').value;
  var file=document.getElementById('np-file').value.trim();
  var due=document.getElementById('np-due').value||null;
  if(!name){toast('Bitte Namen eingeben');return;}
  await db.from('projects').insert({name:name,status:status,blender_file:file,due_date:due,last_worked:new Date().toISOString(),checklist:{}});
  closeModal('m-proj');
  ['np-name','np-file','np-due'].forEach(function(id){document.getElementById(id).value='';});
  await loadAll(); renderProjects(); toast('Projekt erstellt ✓');
}
async function delProject(id){
  if(!confirm('Projekt wirklich löschen?')) return;
  await db.from('projects').delete().eq('id',id);
  UI.expanded.delete(id); await loadAll(); renderProjects(); toast('Gelöscht');
}
async function updStatus(id,s){ await db.from('projects').update({status:s,last_worked:new Date().toISOString()}).eq('id',id); await loadAll(); renderProjects(); }
async function updFile(id,v){ await db.from('projects').update({blender_file:v,last_worked:new Date().toISOString()}).eq('id',id); await loadAll(); renderProjects(); toast('Gespeichert ✓'); }
async function updDue(id,v){ await db.from('projects').update({due_date:v||null}).eq('id',id); await loadAll(); renderProjects(); toast('Deadline gespeichert ✓'); }

async function addTodo(pid){
  var text=(UI.todoInputs[pid]||'').trim(); if(!text) return;
  await db.from('todos').insert({project_id:pid,text:text,done:false});
  await db.from('projects').update({last_worked:new Date().toISOString()}).eq('id',pid);
  UI.todoInputs[pid]=''; await loadAll(); UI.expanded.add(pid); renderProjects(); toast('Task hinzugefügt ✓');
}
function cbClick(el){ var tid=el.dataset.tid, pid=el.dataset.pid, done=!el.classList.contains('done'); db.from('todos').update({done:done}).eq('id',tid).then(function(){db.from('projects').update({last_worked:new Date().toISOString()}).eq('id',pid).then(function(){loadAll().then(renderProjects);});}); }
function tdClick(el){ var tid=el.dataset.tid; db.from('todos').delete().eq('id',tid).then(function(){loadAll().then(renderProjects);}); }
function tiInput(el){ UI.todoInputs[el.dataset.pid]=el.value; }
function tiKey(e,el){ if(e.key==='Enter') tiBtnClick(el); }
function tiBtnClick(el){ addTodo(el.dataset.pid); }
async function toggleTodo(el,tid,pid){ var done=!el.classList.contains('done'); await db.from('todos').update({done:done}).eq('id',tid); await db.from('projects').update({last_worked:new Date().toISOString()}).eq('id',pid); await loadAll(); renderProjects(); }
async function delTodo(id){ await db.from('todos').delete().eq('id',id); await loadAll(); renderProjects(); }

function openShortModal(pid){document.getElementById('ns-pid').value=pid;['ns-title','ns-tags'].forEach(function(id){document.getElementById(id).value='';});openModal('m-short');}
async function createShort(){
  var pid=document.getElementById('ns-pid').value;

  closeModal('m-short'); await loadAll(); renderProjects(); toast('Short hinzugefügt ✓');

// ── YOUTUBE SYNC ──────────────────────────────────────────
function extractYtId(url){
  if(!url) return null;
  var m = url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/)|youtu\.be\/)([^?&\s]+)/);
  return m ? m[1] : null;
}

async function syncYT(silent) {
  var key = D.settings['yt_api_key'];
  if(!key){if(!silent)toast('Bitte YouTube API Key in Einstellungen eintragen');return;}
  var ytPl = D.shortPlatforms.filter(function(p){return p.platform==='youtube'&&p.link;});
  if(!ytPl.length){if(!silent)toast('Keine YouTube-Links gefunden');return;}
  if(!silent) toast('⏳ YouTube wird synchronisiert...');
  var idMap = {};
  ytPl.forEach(function(p){var id=extractYtId(p.link);if(id)idMap[id]=p.id;});
  var ids = Object.keys(idMap);
  if(!ids.length){if(!silent)toast('Keine Video-IDs gefunden');return;}
  try {
    var url = 'https://www.googleapis.com/youtube/v3/videos?part=statistics&id='+ids.join(',')+'&key='+key;
    var res = await fetch(url);
    var data = await res.json();
    if(data.error) throw new Error(data.error.message);
    var updated = 0;
    if(data.items) {
      for(var i=0;i<data.items.length;i++){
        var item = data.items[i];
        var pid = idMap[item.id];
        if(pid){ await db.from('short_platforms').update({views:parseInt(item.statistics.viewCount||0)}).eq('id',pid); updated++; }
      }
    }
    await saveSetting('yt_last_sync', new Date().toISOString());
    await loadAll(); renderProjects();
    if(!silent) toast('✅ '+updated+' Videos synchronisiert');
  } catch(e) {
    if(!silent) toast('YouTube Fehler: '+e.message);
  }
}

// ── REFERENCE SEARCH ──────────────────────────────────────
var activeTags = ['concept art'];

function toggleRefTag(el,tag){
  var i=activeTags.indexOf(tag);
  if(i>=0){activeTags.splice(i,1);el.classList.remove('active');}
  else{activeTags.push(tag);el.classList.add('active');}
}

function addCustomTag(val){
  val=(val||'').trim();
  if(val&&activeTags.indexOf(val)<0)activeTags.push(val);
}

function openRefPanel(){
  var sel = document.getElementById('ref-proj-sel');
  sel.innerHTML = '<option value="">– Projekt wählen –</option>' + D.projects.map(function(p){return '<option value="'+p.id+'">'+statusIcon(p.status)+' '+p.name+'</option>';}).join('');
  document.getElementById('ref-panel').classList.add('open');
  document.getElementById('ref-q').focus();
}
function openRefPanelFor(pid){ openRefPanel(); setTimeout(function(){document.getElementById('ref-proj-sel').value=pid;},50); }
function closeRefPanel(){ document.getElementById('ref-panel').classList.remove('open'); }

async function doRefSearch(){
  var q = document.getElementById('ref-q').value.trim();
  if(!q){ toast('Bitte Suchbegriff eingeben'); return; }
  var btn = document.getElementById('ref-btn');
  var res = document.getElementById('ref-results');
  var customTag = document.getElementById('ref-custom-tag').value.trim();
  if(customTag && activeTags.indexOf(customTag)<0) activeTags.push(customTag);
  var fullQuery = q + (activeTags.length ? ' ' + activeTags.join(' ') : '');
  btn.disabled = true; btn.innerHTML = '⏳';
  res.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;gap:12px"><div class="spinner"></div><div style="color:var(--text3);font-size:13px">KI sucht nach: <strong style="color:var(--text2)">"'+fullQuery+'"</strong></div></div>';
  try {
    var imgs = [];
    // Option 1: Supabase Proxy (KI-Suche via Anthropic)
    var proxyUrl = (typeof PROXY_URL !== 'undefined') ? PROXY_URL : null;
    if(proxyUrl){
      var resp = await fetch(proxyUrl, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({action:'image_search', payload:{query:fullQuery}})
      });
      var data = await resp.json();
      if(data.ok) imgs = data.images;
      else throw new Error(data.error||'Proxy Fehler');
    }
    // Option 2: Google Custom Search API (Fallback)
    else {
      var apiKey = D.settings['gcse_api_key'];
      var cseId  = D.settings['gcse_cx'];
      if(!apiKey||!cseId){
        res.innerHTML = '<div style="color:var(--amber);font-size:13px;text-align:center;padding:3rem 2rem"><div style="font-size:28px;margin-bottom:10px">⚙️</div><strong>Kein Such-Service eingerichtet</strong><br><br>Entweder den <strong>Supabase Proxy</strong> deployen (beste Option mit KI)<br>oder einen <strong>Google CSE API Key</strong> in den Einstellungen eintragen.</div>';
        btn.disabled = false; btn.innerHTML = '🔍 Suchen'; return;
      }
      var url = 'https://www.googleapis.com/customsearch/v1'
        + '?key='+encodeURIComponent(apiKey)
        + '&cx='+encodeURIComponent(cseId)
        + '&q='+encodeURIComponent(fullQuery)
        + '&searchType=image&num=10&safe=active';
      var r2 = await fetch(url);
      var d2 = await r2.json();
      if(d2.error) throw new Error(d2.error.message);
      if(!d2.items||!d2.items.length) throw new Error('Keine Bilder gefunden.');
      imgs = d2.items.map(function(item){
        return {
          title:item.title, image_url:item.link,
          source_url:(item.image&&item.image.contextLink)?item.image.contextLink:item.displayLink,
          site:item.displayLink,
          thumb:(item.image&&item.image.thumbnailLink)?item.image.thumbnailLink:item.link
        };
      });
    }
    if(!imgs.length) throw new Error('Keine Bilder gefunden – anderen Begriff oder Tags versuchen.');
    currentRefImgs = imgs;
    renderRefGrid(imgs, fullQuery);
  } catch(e) {
    res.innerHTML = '<div style="color:var(--red);font-size:13px;text-align:center;padding:3rem"><div style="font-size:28px;margin-bottom:8px">⚠️</div>'+e.message+'</div>';
  }
  btn.disabled = false; btn.innerHTML = '🔍 Suchen';
}

function renderRefGrid(imgs, q){
  var html = '<div style="font-size:12px;color:var(--text3);margin-bottom:10px">'+imgs.length+' Ergebnisse für <strong style="color:var(--text)">"'+q+'"</strong> – Anklicken zum Auswählen</div><div class="img-grid">';
  imgs.forEach(function(img,i){
    var sel = selectedRefs.some(function(r){return r.image_url===img.image_url;});
    html += '<div class="img-item'+(sel?' sel':'')+'" onclick="toggleRef('+i+')" data-i="'+i+'"><img src="'+img.image_url+'" onerror="this.parentElement.style.display=\'none\'" loading="lazy"/><div class="img-lbl">'+img.title+'</div><div class="img-chk">✓</div></div>';
  });
  html += '</div>';
  document.getElementById('ref-results').innerHTML = html;
}

function toggleRef(i){
  var img = currentRefImgs[i];
  if(!img) return;
  var idx = selectedRefs.findIndex(function(r){return r.image_url===img.image_url;});
  if(idx>=0) selectedRefs.splice(idx,1); else selectedRefs.push(img);
  if(currentRefImgs.length) renderRefGrid(currentRefImgs, document.getElementById('ref-q').value);
  renderSelRefs();
}

function renderSelRefs(){
  var list = document.getElementById('ref-sel-list');
  if(!selectedRefs.length){list.innerHTML='<div style="color:var(--text3);font-size:13px;padding:8px 0">Noch nichts ausgewählt</div>';return;}
  list.innerHTML = selectedRefs.map(function(r,i){
    return '<div style="position:relative;margin-bottom:6px"><img class="sel-thumb" src="'+r.image_url+'" onerror="this.style.display=\'none\'"/><button style="position:absolute;top:4px;right:4px;width:18px;height:18px;background:rgba(0,0,0,.7);border-radius:50%;color:#fff;font-size:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center" onclick="removeRef('+i+')">✕</button><div style="font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r.title+'</div></div>';
  }).join('');
}

function removeRef(i){ selectedRefs.splice(i,1); if(currentRefImgs.length) renderRefGrid(currentRefImgs, document.getElementById('ref-q').value); renderSelRefs(); }

async function saveRefs(){
  var pid = document.getElementById('ref-proj-sel').value;
  if(!pid){toast('Bitte Projekt wählen');return;}
  if(!selectedRefs.length){toast('Bitte Bilder auswählen');return;}
  var inserts = selectedRefs.map(function(r){return{project_id:pid,title:r.title,image_url:r.image_url,source_url:r.source_url||''};});
  var r = await db.from('project_references').insert(inserts);
  if(r.error){toast('Fehler: '+r.error.message);return;}
  selectedRefs = []; renderSelRefs();
  await loadAll();
  var proj = D.projects.find(function(p){return p.id===pid;});
  toast((proj?'Zu "'+proj.name+'"':'')+(inserts.length)+' Bild'+(inserts.length>1?'er':'')+' gespeichert ✓');
}
