<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blender Projects</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #18181f;
  --bg4: #1e1e28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f5;
  --text2: #8888a0;
  --text3: #555565;
  --accent: #6c63ff;
  --accent2: #9b95ff;
  --green: #3ecf8e;
  --green2: #0a2e1e;
  --blue: #3b82f6;
  --blue2: #0a1a2e;
  --amber: #f59e0b;
  --amber2: #2a1a00;
  --red: #ef4444;
  --radius: 10px;
  --radius-lg: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  min-height: 100vh;
}
.mono { font-family: 'Space Mono', monospace; }

/* Layout */
.app { max-width: 860px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

/* Header */
.header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 2.5rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
}
.header-title {
  font-family: 'Space Mono', monospace;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
}
.header-sub { font-size: 13px; color: var(--text3); margin-top: 4px; }
.header-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  margin-right: 6px;
  box-shadow: 0 0 8px var(--green);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Buttons */
button {
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  border: none;
  outline: none;
  transition: all 0.15s;
}
.btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 7px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { border-color: var(--accent); color: var(--accent2); }
.btn-accent {
  background: var(--accent);
  border: 1px solid var(--accent);
  color: #fff;
  padding: 8px 18px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-accent:hover { background: #7b73ff; }
.btn-danger { color: var(--red); border-color: transparent; background: transparent; padding: 6px 10px; border-radius: var(--radius); font-size: 13px; }
.btn-danger:hover { background: rgba(239,68,68,0.1); }

/* Stat cards */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 1.5rem;
}
.stat-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem 1.25rem;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  opacity: 0;
  transition: opacity 0.2s;
}
.stat-card.fertig::before { background: var(--green); }
.stat-card.bearbeitung::before { background: var(--blue); }
.stat-card.idee::before { background: var(--amber); }
.stat-card:hover, .stat-card.active { border-color: var(--border2); }
.stat-card:hover::before, .stat-card.active::before { opacity: 1; }
.stat-icon { font-size: 20px; margin-bottom: 10px; }
.stat-num {
  font-family: 'Space Mono', monospace;
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-card.fertig .stat-num { color: var(--green); }
.stat-card.bearbeitung .stat-num { color: var(--blue); }
.stat-card.idee .stat-num { color: var(--amber); }
.stat-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }

/* Last worked */
.last-worked {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 1.5rem;
}
.last-worked-icon {
  width: 38px; height: 38px;
  background: var(--bg4);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.last-worked-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
.last-worked-name { font-size: 15px; font-weight: 500; }
.last-worked-file { font-size: 12px; color: var(--text3); font-family: 'Space Mono', monospace; margin-top: 2px; }
.last-worked-time { font-size: 12px; color: var(--text3); margin-left: auto; white-space: nowrap; }

/* Section header */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  margin-top: 0.5rem;
}
.section-title { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }

/* Filter bar */
.filter-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px;
}
.filter-tag {
  font-size: 12px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 4px 12px;
  border-radius: 20px;
  cursor: pointer;
}
.filter-clear { color: var(--text3); font-size: 12px; cursor: pointer; }
.filter-clear:hover { color: var(--text2); }

/* Project cards */
.proj-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.15s;
}
.proj-card:hover { border-color: var(--border2); }
.proj-header {
  padding: 14px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
}
.proj-header:hover { background: var(--bg3); }
.proj-cube {
  width: 32px; height: 32px;
  background: var(--bg4);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.proj-name { font-size: 14px; font-weight: 500; flex: 1; }
.proj-meta { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
.chevron { font-size: 14px; color: var(--text3); transition: transform 0.2s; }
.chevron.open { transform: rotate(180deg); }

/* Status badges */
.badge {
  font-size: 11px;
  font-weight: 500;
  padding: 2px 9px;
  border-radius: 20px;
  white-space: nowrap;
}
.badge-fertig { background: var(--green2); color: var(--green); border: 1px solid rgba(62,207,142,0.2); }
.badge-bearbeitung { background: var(--blue2); color: var(--blue); border: 1px solid rgba(59,130,246,0.2); }
.badge-idee { background: var(--amber2); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }

/* Project body */
.proj-body {
  padding: 16px;
  border-top: 1px solid var(--border);
  display: none;
}
.proj-body.open { display: block; }

/* Subsection */
.subsection { margin-bottom: 20px; }
.subsection-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.subsection-label {
  font-size: 11px; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.08em;
}

/* Blender file row */
.file-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
}
.file-row input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 12px;
  border-radius: var(--radius);
  font-size: 13px;
  font-family: 'Space Mono', monospace;
  outline: none;
  transition: border-color 0.15s;
}
.file-row input:focus { border-color: var(--accent); }
.file-row input::placeholder { color: var(--text3); }
.status-select {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 7px 10px;
  border-radius: var(--radius);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  cursor: pointer;
}
.status-select:focus { border-color: var(--accent); }

/* Todos */
.todo-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.todo-item:last-child { border-bottom: none; }
.todo-check {
  width: 18px; height: 18px;
  border: 1px solid var(--border2);
  border-radius: 5px;
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  font-size: 11px;
  color: transparent;
}
.todo-check.done {
  background: var(--green);
  border-color: var(--green);
  color: #000;
}
.todo-text { font-size: 13px; flex: 1; }
.todo-text.done { text-decoration: line-through; color: var(--text3); }
.todo-del { opacity: 0; background: transparent; color: var(--text3); font-size: 16px; padding: 2px; border-radius: 4px; }
.todo-item:hover .todo-del { opacity: 1; }
.todo-del:hover { color: var(--red); }

/* Shorts */
.short-item {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 10px;
}
.short-play {
  width: 28px; height: 28px;
  background: var(--bg4);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}
.short-info { flex: 1; min-width: 0; }
.short-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.short-tags { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }
.tag {
  font-size: 11px;
  background: var(--bg4);
  color: var(--text3);
  padding: 1px 7px;
  border-radius: 20px;
  border: 1px solid var(--border);
}
.short-views {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--text3);
  white-space: nowrap;
}

/* Empty state */
.empty { font-size: 13px; color: var(--text3); padding: 10px 0; }

/* Inline add form */
.add-row {
  display: flex; gap: 8px; margin-top: 10px;
}
.add-row input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 12px;
  border-radius: var(--radius);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
}
.add-row input:focus { border-color: var(--accent); }
.add-row input::placeholder { color: var(--text3); }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg);
  padding: 24px;
  width: 380px;
  max-width: calc(100vw - 2rem);
}
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--text3); margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.05em; }
.form-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 12px;
  border-radius: var(--radius);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text3); }
.form-select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 9px 12px;
  border-radius: var(--radius);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  cursor: pointer;
}
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* Toast */
.toast {
  position: fixed; bottom: 2rem; right: 2rem;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 10px 18px;
  border-radius: var(--radius);
  font-size: 13px;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.2s;
  z-index: 300;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* Loading */
.loading {
  display: flex; align-items: center; justify-content: center;
  height: 60vh;
  flex-direction: column;
  gap: 16px;
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Config screen */
.config-screen {
  max-width: 480px; margin: 6rem auto; padding: 2rem;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}
.config-title {
  font-family: 'Space Mono', monospace;
  font-size: 18px; font-weight: 700; margin-bottom: 8px;
}
.config-sub { font-size: 13px; color: var(--text3); margin-bottom: 24px; line-height: 1.6; }
.config-step {
  background: var(--bg3);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 8px;
  font-size: 13px;
  line-height: 1.6;
}
.config-step code {
  font-family: 'Space Mono', monospace;
  background: var(--bg4);
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 12px;
  color: var(--accent2);
}

/* Progress bar for todos */
.todo-progress { margin-bottom: 10px; }
.progress-bar { height: 3px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }
.progress-text { font-size: 11px; color: var(--text3); margin-top: 4px; }

@media (max-width: 600px) {
  .stats-grid { grid-template-columns: 1fr 1fr 1fr; }
  .stat-num { font-size: 24px; }
  .modal { width: calc(100vw - 2rem); }
}
</style>
</head>

</script>

<div id="root"></div>

<div class="toast" id="toast"></div>

<!-- Modal: Neues Projekt -->
<div class="modal-overlay" id="modal-project">
  <div class="modal">
    <div class="modal-title">Neues Projekt</div>
    <div class="form-group">
      <label class="form-label">Projektname</label>
      <input class="form-input" id="np-name" placeholder="z.B. Kokiri Forest – OoT" />
    </div>
    <div class="form-group">
      <label class="form-label">Status</label>
      <select class="form-select" id="np-status">
        <option value="idee">💡 Idee</option>
        <option value="bearbeitung" selected>🔵 In Bearbeitung</option>
        <option value="fertig">✅ Fertig</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Blender Dateiname (optional)</label>
      <input class="form-input mono" id="np-file" placeholder="projekt_v1.blend" />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-project')">Abbrechen</button>
      <button class="btn-accent" onclick="createProject()">Erstellen</button>
    </div>
  </div>
</div>

<!-- Modal: Neuer Short -->
<div class="modal-overlay" id="modal-short">
  <div class="modal">
    <div class="modal-title">Short hinzufügen</div>
    <input type="hidden" id="ns-projid" />
    <div class="form-group">
      <label class="form-label">Titel</label>
      <input class="form-input" id="ns-title" placeholder="Short-Titel" />
    </div>
    <div class="form-group">
      <label class="form-label">Aufrufe</label>
      <input class="form-input" id="ns-views" type="number" placeholder="0" />
    </div>
    <div class="form-group">
      <label class="form-label">Tags (kommagetrennt)</label>
      <input class="form-input" id="ns-tags" placeholder="Blender, Retro, GameScene" />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-short')">Abbrechen</button>
      <button class="btn-accent" onclick="createShort()">Hinzufügen</button>
    </div>
  </div>
</div>

<script>
const { createClient } = supabase;
let db = null;
let projects = [];
let todos = [];
let shorts = [];
let activeFilter = null;
let expandedIds = new Set();
let newTodoInputs = {};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

function isConfigured() {
  return SUPABASE_URL !== 'DEINE_SUPABASE_URL_HIER' && SUPABASE_KEY !== 'DEIN_SUPABASE_ANON_KEY_HIER';
}

async function init() {
  const root = document.getElementById('root');

  if (!isConfigured()) {
    root.innerHTML = `
      <div class="config-screen">
        <div class="config-title">// Setup erforderlich</div>
        <div class="config-sub">Trag deine Supabase-Zugangsdaten in die index.html ein. Du findest sie in deinem Supabase Dashboard unter Project Settings → API.</div>
        <div class="config-step">1. Öffne die <code>index.html</code> in einem Texteditor</div>
        <div class="config-step">2. Ersetze <code>DEINE_SUPABASE_URL_HIER</code> mit deiner Project URL</div>
        <div class="config-step">3. Ersetze <code>DEIN_SUPABASE_ANON_KEY_HIER</code> mit deinem anon/public Key</div>
        <div class="config-step">4. Speichern und nochmal öffnen ✓</div>
      </div>`;
    return;
  }

  root.innerHTML = `<div class="loading"><div class="spinner"></div><div style="color:var(--text3);font-size:13px">Wird geladen...</div></div>`;

  try {
    db = createClient(SUPABASE_URL, SUPABASE_KEY);
    await loadAll();
    render();
  } catch(e) {
    root.innerHTML = `<div class="loading"><div style="color:var(--red)">Verbindungsfehler: ${e.message}</div></div>`;
  }
}

async function loadAll() {
  const [p, t, s] = await Promise.all([
    db.from('projects').select('*').order('created_at', {ascending: false}),
    db.from('todos').select('*').order('created_at', {ascending: true}),
    db.from('shorts').select('*').order('created_at', {ascending: false}),
  ]);
  projects = p.data || [];
  todos = t.data || [];
  shorts = s.data || [];
}

function getLastWorked() {
  return [...projects].filter(p => p.last_worked).sort((a,b) => new Date(b.last_worked) - new Date(a.last_worked))[0];
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const h = Math.floor(diff / 3600000);
  if (h < 1) return 'Gerade eben';
  if (h < 24) return `Vor ${h}h`;
  return `Vor ${Math.floor(h/24)}d`;
}

function statusLabel(s) {
  if (s === 'fertig') return 'Fertig';
  if (s === 'bearbeitung') return 'In Bearbeitung';
  return 'Idee';
}

function statusIcon(s) {
  if (s === 'fertig') return '✅';
  if (s === 'bearbeitung') return '🔵';
  return '💡';
}

function fmt(n) { return n >= 1000 ? (n/1000).toFixed(1) + 'k' : n.toString(); }

function render() {
  const fertig = projects.filter(p => p.status === 'fertig').length;
  const bearbeitung = projects.filter(p => p.status === 'bearbeitung').length;
  const idee = projects.filter(p => p.status === 'idee').length;
  const last = getLastWorked();
  const filtered = activeFilter ? projects.filter(p => p.status === activeFilter) : projects;

  let html = `<div class="app">`;

  // Header
  html += `<div class="header">
    <div>
      <div class="header-title">// blender_projects</div>
      <div class="header-sub"><span class="header-dot"></span>${projects.length} Projekte · GitHub Pages</div>
    </div>
    <button class="btn-accent" onclick="openModal('modal-project')">+ Neues Projekt</button>
  </div>`;

  // Stats
  html += `<div class="stats-grid">
    <div class="stat-card fertig${activeFilter==='fertig'?' active':''}" onclick="setFilter('fertig')">
      <div class="stat-icon">✅</div>
      <div class="stat-num">${fertig}</div>
      <div class="stat-label">Fertig</div>
    </div>
    <div class="stat-card bearbeitung${activeFilter==='bearbeitung'?' active':''}" onclick="setFilter('bearbeitung')">
      <div class="stat-icon">🔵</div>
      <div class="stat-num">${bearbeitung}</div>
      <div class="stat-label">In Arbeit</div>
    </div>
    <div class="stat-card idee${activeFilter==='idee'?' active':''}" onclick="setFilter('idee')">
      <div class="stat-icon">💡</div>
      <div class="stat-num">${idee}</div>
      <div class="stat-label">Ideen</div>
    </div>
  </div>`;

  // Last worked
  if (last) {
    const lastTodos = todos.filter(t => t.project_id === last.id);
    const done = lastTodos.filter(t => t.done).length;
    html += `<div class="last-worked">
      <div class="last-worked-icon">🎬</div>
      <div style="flex:1;min-width:0">
        <div class="last-worked-label">Zuletzt bearbeitet</div>
        <div class="last-worked-name">${last.name}</div>
        ${last.blender_file ? `<div class="last-worked-file">📁 ${last.blender_file}</div>` : ''}
        <div style="margin-top:6px">
          <div class="progress-bar" style="height:3px;background:var(--bg4);border-radius:2px;overflow:hidden">
            <div style="height:100%;background:var(--green);border-radius:2px;width:${lastTodos.length ? Math.round(done/lastTodos.length*100) : 0}%;transition:width 0.3s"></div>
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:3px">${done}/${lastTodos.length} Tasks</div>
        </div>
      </div>
      <div class="last-worked-time">${timeAgo(last.last_worked)}</div>
    </div>`;
  }

  // Filter label
  if (activeFilter) {
    html += `<div class="filter-bar">
      <span class="filter-tag">${statusIcon(activeFilter)} ${statusLabel(activeFilter)}</span>
      <span class="filter-clear" onclick="setFilter(null)">✕ Zurücksetzen</span>
    </div>`;
  }

  // Project list header
  html += `<div class="section-header">
    <div class="section-title">${activeFilter ? filtered.length + ' Projekte' : 'Alle Projekte'}</div>
  </div>`;

  if (!filtered.length) {
    html += `<div style="text-align:center;padding:3rem 0;color:var(--text3);font-size:14px">Keine Projekte in dieser Kategorie</div>`;
  }

  for (const p of filtered) {
    const expanded = expandedIds.has(p.id);
    const projTodos = todos.filter(t => t.project_id === p.id);
    const projShorts = shorts.filter(s => s.project_id === p.id);
    const doneTodos = projTodos.filter(t => t.done).length;
    const todoInput = newTodoInputs[p.id] || '';

    html += `<div class="proj-card">
      <div class="proj-header" onclick="toggleExpand('${p.id}')">
        <div class="proj-cube">${statusIcon(p.status)}</div>
        <div class="proj-name">${p.name}</div>
        <div class="proj-meta">
          <span class="badge badge-${p.status}">${statusLabel(p.status)}</span>
          ${projShorts.length ? `<span>${projShorts.length} Short${projShorts.length>1?'s':''}</span>` : ''}
          <span>${doneTodos}/${projTodos.length} ✓</span>
        </div>
        <div class="chevron${expanded?' open':''}">▾</div>
      </div>`;

    if (expanded) {
      html += `<div class="proj-body open">`;

      // File + status + delete
      html += `<div class="file-row">
        <span style="font-size:14px">📁</span>
        <input placeholder="dateiname.blend" value="${p.blender_file || ''}"
          onchange="updateBlenderFile('${p.id}', this.value)"
          style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:var(--radius);font-size:12px;font-family:'Space Mono',monospace;outline:none;flex:1" />
        <select class="status-select" onchange="updateStatus('${p.id}', this.value)">
          <option value="idee"${p.status==='idee'?' selected':''}>💡 Idee</option>
          <option value="bearbeitung"${p.status==='bearbeitung'?' selected':''}>🔵 In Arbeit</option>
          <option value="fertig"${p.status==='fertig'?' selected':''}>✅ Fertig</option>
        </select>
        <button class="btn-danger" onclick="deleteProject('${p.id}')" title="Projekt löschen">🗑</button>
      </div>`;

      // Shorts
      html += `<div class="subsection">
        <div class="subsection-header">
          <div class="subsection-label">Shorts</div>
          <button class="btn" onclick="openShortModal('${p.id}')">+ Short</button>
        </div>`;
      if (!projShorts.length) {
        html += `<div class="empty">Noch keine Shorts hinzugefügt</div>`;
      }
      for (const s of projShorts) {
        const tags = Array.isArray(s.tags) ? s.tags : [];
        html += `<div class="short-item">
          <div class="short-play">▶</div>
          <div class="short-info">
            <div class="short-title">${s.title}</div>
            <div class="short-tags">${tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>
          </div>
          <div class="short-views">👁 ${fmt(s.views)}</div>
          <button class="btn-danger" onclick="deleteShort('${s.id}')" title="Löschen" style="font-size:12px;padding:4px 8px">✕</button>
        </div>`;
      }
      html += `</div>`;

      // Todos
      const pct = projTodos.length ? Math.round(doneTodos / projTodos.length * 100) : 0;
      html += `<div class="subsection">
        <div class="subsection-header">
          <div class="subsection-label">Todo-Liste <span style="color:var(--text3);font-weight:400">${pct}%</span></div>
          <span style="font-size:12px;color:var(--text3)">${doneTodos}/${projTodos.length}</span>
        </div>
        <div class="todo-progress">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>`;

      if (!projTodos.length) {
        html += `<div class="empty">Noch keine Tasks</div>`;
      }
      for (const t of projTodos) {
        html += `<div class="todo-item">
          <div class="todo-check${t.done?' done':''}" onclick="toggleTodo('${t.id}','${p.id}',${!t.done})">${t.done?'✓':''}</div>
          <div class="todo-text${t.done?' done':''}">${t.text}</div>
          <button class="todo-del btn-danger" onclick="deleteTodo('${t.id}')" style="font-size:12px;padding:4px 8px">✕</button>
        </div>`;
      }

      html += `<div class="add-row">
        <input placeholder="Neuen Task eingeben..." id="todo-input-${p.id}" value="${todoInput}"
          oninput="newTodoInputs['${p.id}']=this.value"
          onkeydown="if(event.key==='Enter')addTodo('${p.id}')" />
        <button class="btn-accent" onclick="addTodo('${p.id}')">+ Task</button>
      </div>`;

      html += `</div>`;
      html += `</div>`;
    }
    html += `</div>`;
  }

  html += `</div>`;
  document.getElementById('root').innerHTML = html;
}

function setFilter(f) {
  activeFilter = activeFilter === f ? null : f;
  render();
}

function toggleExpand(id) {
  if (expandedIds.has(id)) expandedIds.delete(id);
  else expandedIds.add(id);
  render();
}

async function createProject() {
  const name = document.getElementById('np-name').value.trim();
  const status = document.getElementById('np-status').value;
  const file = document.getElementById('np-file').value.trim();
  if (!name) { showToast('Bitte einen Namen eingeben'); return; }
  const { error } = await db.from('projects').insert({ name, status, blender_file: file, last_worked: new Date().toISOString() });
  if (error) { showToast('Fehler: ' + error.message); return; }
  closeModal('modal-project');
  document.getElementById('np-name').value = '';
  document.getElementById('np-file').value = '';
  await loadAll(); render();
  showToast('Projekt erstellt ✓');
}

async function deleteProject(id) {
  if (!confirm('Projekt wirklich löschen? Todos und Shorts werden auch gelöscht.')) return;
  await db.from('projects').delete().eq('id', id);
  expandedIds.delete(id);
  await loadAll(); render();
  showToast('Projekt gelöscht');
}

async function updateStatus(id, status) {
  await db.from('projects').update({ status, last_worked: new Date().toISOString() }).eq('id', id);
  await loadAll(); render();
}

async function updateBlenderFile(id, val) {
  await db.from('projects').update({ blender_file: val, last_worked: new Date().toISOString() }).eq('id', id);
  await loadAll(); render();
  showToast('Dateiname gespeichert ✓');
}

async function addTodo(projId) {
  const text = (newTodoInputs[projId] || '').trim();
  if (!text) return;
  await db.from('todos').insert({ project_id: projId, text, done: false });
  await db.from('projects').update({ last_worked: new Date().toISOString() }).eq('id', projId);
  newTodoInputs[projId] = '';
  await loadAll(); render();
  showToast('Task hinzugefügt ✓');
  // re-expand
  expandedIds.add(projId);
  render();
}

async function toggleTodo(todoId, projId, done) {
  await db.from('todos').update({ done }).eq('id', todoId);
  await db.from('projects').update({ last_worked: new Date().toISOString() }).eq('id', projId);
  await loadAll(); render();
}

async function deleteTodo(id) {
  await db.from('todos').delete().eq('id', id);
  await loadAll(); render();
}

function openShortModal(projId) {
  document.getElementById('ns-projid').value = projId;
  document.getElementById('ns-title').value = '';
  document.getElementById('ns-views').value = '';
  document.getElementById('ns-tags').value = '';
  openModal('modal-short');
}

async function createShort() {
  const projId = document.getElementById('ns-projid').value;
  const title = document.getElementById('ns-title').value.trim();
  const views = parseInt(document.getElementById('ns-views').value) || 0;
  const tags = document.getElementById('ns-tags').value.split(',').map(t => t.trim()).filter(Boolean);
  if (!title) { showToast('Bitte einen Titel eingeben'); return; }
  await db.from('shorts').insert({ project_id: projId, title, views, tags });
  await db.from('projects').update({ last_worked: new Date().toISOString() }).eq('id', projId);
  closeModal('modal-short');
  await loadAll(); render();
  showToast('Short hinzugefügt ✓');
}

async function deleteShort(id) {
  await db.from('shorts').delete().eq('id', id);
  await loadAll(); render();
}

init();
</script>
</body>
</html>
